image: maven:3.6.3-jdk-8

variables:
  MAVEN_VERSION: "3.6.3"
  MAVEN_HOME: "/opt/maven"
  JAVA_HOME: "/usr/lib/jvm/java-8-openjdk-amd64"
  PATH: "$MAVEN_HOME/bin:$PATH"

stages:
  - clean
  - package

before_script:
  - echo "Iniciando pipeline Spring Boot"

clean:
  stage: clean
  script:
    - mvn clean 

package:
  stage: package
  script:
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/jfx/native/*.exe