image: maven:3.6.3-jdk-8

variables:
  MAVEN_VERSION: "3.6.3"
  MAVEN_HOME: "/usr/share/maven"
  JAVA_HOME: "/docker-java-home"

stages:
  - clean
  - package

before_script:
  - echo "Iniciando pipeline Spring Boot"

clean:
  stage: clean
  script:
    - mvn clean 

package:
  stage: package
  script:
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/jfx/native/*.exe